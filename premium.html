<!DOCTYPE html>
<html lang="id">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Premium Scorpio</title>

<style>
body{
  margin:0;
  font-family:sans-serif;
  background:#0b1220;
  color:#fff;
  text-align:center;
}

.glass{
  background:rgba(255,255,255,0.08);
  padding:20px;
  margin:20px;
  border-radius:15px;
}

button{
  padding:10px 15px;
  border:none;
  border-radius:10px;
  background:#f43f5e;
  color:white;
  cursor:pointer;
}
</style>
</head>

<body>

<h2>💎 Premium Scorpio</h2>

<div class="glass">
  🔮 Ramalan eksklusif kamu:
  <br><br>
  Energi kamu sedang naik. Waktu terbaik untuk keputusan besar.
</div>

<button onclick="logout()">🔙 Keluar</button>

<script>

/* 🔐 CHECK ACCESS (INI YANG BENAR) */
const access = sessionStorage.getItem("scorpio_access");

if(access !== "true"){
  alert("❌ Akses ditolak!");
  window.location.href = "index.html";
}

/* 🔙 LOGOUT */
function logout(){
  sessionStorage.removeItem("scorpio_access");
  window.location.href = "index.html";
}

</script>

</body>
</html>
